<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BAEL ENGINE</title>

<style>

body{

    margin:0;
    overflow:hidden;
    background:black;
}

</style>

</head>

<body>



<script type="module">

/* =========================
   RENDERER
========================= */

import {

    scene,
    camera,
    renderer

} from "./engine/renderer.js";

/* =========================
   MAP
========================= */

import {

    loadMap

} from "./engine/mapLoader.js";

/* =========================
   PLAYER
========================= */

import {

    player,
    updatePlayer

} from "./game/player.js";

/* =========================
   CAMERA
========================= */

import {

    updateCamera

} from "./engine/camera.js";

/* =========================
   SAVE SYSTEM
========================= */

import {

    saveGame,
    loadGame

} from "./engine/saveSystem.js";

/* =========================
   LOAD MAP
========================= */

await loadMap(

    scene,
    "./maps/map.json"

);

/* =========================
   ADD PLAYER
========================= */

scene.add(player);

/* =========================
   LOAD SAVE
========================= */

loadGame(player);

/* =========================
   SAVE KEY
========================= */

window.addEventListener(

    "keydown",

    (e)=>{

        if(e.key === "p"){

            saveGame(player);
        }

    }
);

/* =========================
   LOOP
========================= */

function animate(){

    requestAnimationFrame(animate);

    updatePlayer();

    updateCamera(player);

    renderer.render(

        scene,
        camera

    );
}

animate();

</script>



</body>
</html>
