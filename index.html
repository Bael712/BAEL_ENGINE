<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BAEL ENGINE</title>

<style>

body{

    margin:0;
    overflow:hidden;
    background:black;
}

/* =========================
   MENU BUTTON
========================= */

#menuButton{

    position:fixed;
    top:15px;
    left:15px;

    width:45px;
    height:45px;

    border-radius:50%;

    background:rgba(255,255,255,0.15);
    border:2px solid rgba(255,255,255,0.3);

    color:white;
    font-size:20px;

    display:flex;
    align-items:center;
    justify-content:center;

    cursor:pointer;

    z-index:200;
}

/* =========================
   HUD
========================= */

#hud{

    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);

    display:flex;
    flex-direction:column;
    gap:8px;

    z-index:100;
}

/* =========================
   BAR
========================= */

.barWrap{

    width:280px;
    height:18px;

    background:rgba(0,0,0,0.4);

    border:2px solid rgba(255,255,255,0.2);

    border-radius:999px;

    overflow:hidden;

    position:relative;
}

/* HP */

#hpBar{

    width:100%;
    height:100%;

    background:#2ecc71;
}

/* MP */

#mpBar{

    width:100%;
    height:100%;

    background:#f39c12;
}

/* MP MAX TEXT */

#mpMaxText{

    position:absolute;

    right:6px;
    top:50%;
    transform:translateY(-50%);

    font-size:12px;

    color:#9b59b6;

    font-weight:bold;

    pointer-events:none;
}

/* =========================
   MENU PANEL
========================= */

#menuPanel{

    position:fixed;
    top:70px;
    left:15px;

    width:200px;

    background:rgba(0,0,0,0.7);

    border:2px solid rgba(255,255,255,0.2);

    border-radius:10px;

    padding:10px;

    display:none;

    flex-direction:column;
    gap:10px;

    z-index:300;
}

.menuItem{

    color:white;

    padding:10px;

    border-radius:6px;

    background:rgba(255,255,255,0.05);

    cursor:pointer;
}

.menuItem:hover{

    background:rgba(255,255,255,0.15);
}

</style>

</head>

<body>

<!-- =========================
   MENU BUTTON
========================= -->

<div id="menuButton">☰</div>

<!-- =========================
   HUD
========================= -->

<div id="hud">

    <div class="barWrap">
        <div id="hpBar"></div>
    </div>

    <div class="barWrap">
        <div id="mpBar"></div>
        <div id="mpMaxText"></div>
    </div>

</div>

<!-- =========================
   MENU PANEL
========================= -->

<div id="menuPanel">

    <div class="menuItem">Resume</div>
    <div class="menuItem">Save</div>
    <div class="menuItem">Settings</div>

</div>

<script type="module">

import {

    scene,
    camera,
    renderer

} from "./engine/renderer.js";

import {

    loadMap

} from "./engine/mapLoader.js";

import {

    player,
    updatePlayer

} from "./game/player.js";

import {

    updateCamera

} from "./engine/camera.js";

import {

    saveGame,
    loadGame

} from "./engine/saveSystem.js";

import {

    initMenu

} from "./ui/menu.js";

import {

    updateHUD

} from "./ui/hud.js";

/* =========================
   INIT MENU
========================= */

initMenu();

/* =========================
   LOAD MAP
========================= */

await loadMap(

    scene,
    "./maps/map.json"

);

/* =========================
   PLAYER
========================= */

scene.add(player);

loadGame(player);

/* =========================
   SAVE KEY
========================= */

window.addEventListener("keydown", (e) => {

    if(e.key === "p"){

        saveGame(player);

    }

});

/* =========================
   LOOP
========================= */

function animate(){

    requestAnimationFrame(animate);

    updatePlayer();

    updateCamera(player);

    updateHUD();

    renderer.render(scene, camera);

}

animate();

</script>

</body>

</html>
